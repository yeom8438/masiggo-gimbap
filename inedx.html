<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마시꼬 김밥</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #FCF8E6;
      text-align: center;
    }

    header {
      background-color: #FFB347;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .main {
      padding: 40px;
    }

    button {
      padding: 15px;
      width: 200px;
      background-color: #FFB347;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .menu {
      padding: 20px;
    }

    .card {
      background: white;
      margin: 10px auto;
      padding: 20px;
      width: 200px;
      border-radius: 10px;
    }

    footer {
      background-color: #4A3F35;
      color: white;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>마시꼬 김밥</h1>
</header>

<section class="main">
  <h2>오늘 식사는 맛있게</h2>
  <button>메뉴 보기</button>
</section>

<section class="menu">
  <div class="card">
    <h3>참치김밥</h3>
    <p>4500원</p>
  </div>
</section>

<footer>
  <p>전화: 010-0000-0000</p>
</footer>

</body>
</html>
